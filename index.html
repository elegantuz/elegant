<style>
  :root {
    --bg: #0B1326; --fg: #f3eed8; --muted: #9aa1b6; --card: #101a32; --band: #0d1628; --ink: #070d1c;
    --gold: #D4AF37; --gold-rgb: 212,175,55; --accent: #D4AF37;
    --hairline: rgba(243,238,216,0.10); --hover: rgba(243,238,216,0.04);
    --nav-bg-scrolled: rgba(11,19,38,0.72);
    --mesh1: rgba(212,175,55,0.18); --mesh2: rgba(60,90,160,0.18); --mesh3: rgba(212,175,55,0.10);
    --headline-font: 'Cormorant Garamond', serif;
  }
  html, body { background: var(--bg); color: var(--fg); }
  body { font-family: 'Inter', sans-serif; transition: background .5s ease, color .5s ease; }
  * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  ::selection { background: var(--gold); color: #1a1408; }

  html { scroll-behavior: smooth; }

  h1, h2, h3, h4 { font-family: var(--headline-font); }

  /* Animations */
  @keyframes meshShift {
    0%, 100% { transform: translate3d(0,0,0) scale(1); }
    33% { transform: translate3d(-2%, 1%, 0) scale(1.04); }
    66% { transform: translate3d(2%, -1%, 0) scale(1.02); }
  }
  @keyframes float1 {
    0%, 100% { transform: translate3d(0,0,0); }
    50% { transform: translate3d(40px, 20px, 0); }
  }
  @keyframes float2 {
    0%, 100% { transform: translate3d(0,0,0); }
    50% { transform: translate3d(-30px, 30px, 0); }
  }
  @keyframes float3 {
    0%, 100% { transform: translate3d(0,0,0); }
    50% { transform: translate3d(20px, -25px, 0); }
  }
  @keyframes floatY {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  @keyframes scrollDot {
    0% { transform: translateY(-100%); }
    100% { transform: translateY(400%); }
  }

  /* ===== WOW additions ===== */
  @keyframes marqueeX {
    0%   { transform: translate3d(0,0,0); }
    100% { transform: translate3d(-50%,0,0); }
  }
  @keyframes shimmerSweep {
    0%   { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  @keyframes wordRise {
    0%   { transform: translate3d(0,110%,0) rotate(2deg); opacity: 0; }
    60%  { opacity: 1; }
    100% { transform: translate3d(0,0,0) rotate(0deg); opacity: 1; }
  }
  @keyframes drawStroke {
    to { stroke-dashoffset: 0; }
  }
  @keyframes preloaderFade {
    0%, 75% { opacity: 1; visibility: visible; }
    100%    { opacity: 0; visibility: hidden; }
  }
  @keyframes preloaderBarFill {
    0%   { transform: scaleX(0); }
    100% { transform: scaleX(1); }
  }
  @keyframes ringPulse {
    0%   { transform: scale(.6); opacity: .9; }
    100% { transform: scale(2.2); opacity: 0; }
  }
  @keyframes glowPulse {
    0%, 100% { opacity: .65; transform: scale(1); }
    50%      { opacity: 1;   transform: scale(1.04); }
  }

  .wow-shimmer {
    background-image: linear-gradient(110deg,
      var(--fg) 0%, var(--fg) 35%,
      var(--gold) 48%, var(--gold) 52%,
      var(--fg) 65%, var(--fg) 100%);
    background-size: 220% 100%;
    -webkit-background-clip: text; background-clip: text;
    color: transparent;
    animation: shimmerSweep 6s ease-in-out infinite;
  }
  .word-mask {
    display: inline-block; overflow: hidden; vertical-align: bottom;
    padding-bottom: 0.22em; margin-bottom: -0.22em;
    line-height: 1.05;
  }
  .word-mask > span {
    display: inline-block;
    transform: translate3d(0,110%,0);
    animation: wordRise 900ms cubic-bezier(.2,.8,.2,1) forwards;
  }
  .marquee-track {
    display: flex; width: max-content;
    animation: marqueeX 38s linear infinite;
  }
  .marquee-track:hover { animation-play-state: paused; }
  .tilt-card {
    position: relative;
    transform-style: preserve-3d;
    transition: transform 280ms cubic-bezier(.2,.8,.2,1);
    will-change: transform;
    border-radius: 24px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }
  .tilt-card > a, .tilt-card > div:not(.tilt-shine), .tilt-card > article {
    border-radius: inherit;
    display: block;
    height: 100%;
  }
  .tilt-card .tilt-shine {
    position: absolute; inset: 0; pointer-events: none;
    border-radius: inherit; overflow: hidden;
    background: radial-gradient(circle at var(--mx,50%) var(--my,50%), rgba(var(--gold-rgb),0.18), transparent 45%);
    opacity: 0; transition: opacity 280ms ease;
    z-index: 2;
  }
  .tilt-card:hover .tilt-shine { opacity: 1; }
  .preloader {
    position: fixed; inset: 0; z-index: 9999;
    display: grid; place-items: center;
    background: var(--bg);
    animation: preloaderFade 1.6s cubic-bezier(.5,.0,.2,1) forwards;
    animation-delay: .2s;
  }
  .preloader-bar {
    position: absolute; left: 0; right: 0; bottom: 0; height: 2px;
    background: var(--gold);
    transform-origin: left center;
    animation: preloaderBarFill 1.4s cubic-bezier(.7,0,.2,1) forwards;
  }
  .preloader-ring {
    position: absolute; width: 200px; height: 200px; border-radius: 50%;
    border: 1px solid var(--gold);
    animation: ringPulse 1.8s cubic-bezier(.2,.7,.2,1) infinite;
  }
  .scroll-progress {
    position: fixed; top: 0; left: 0; height: 3px;
    background: linear-gradient(90deg, transparent, var(--gold), var(--gold));
    z-index: 60; transform-origin: left center;
    box-shadow: 0 0 12px rgba(var(--gold-rgb),.7);
    pointer-events: none;
  }
  .magnet-btn { transition: transform 200ms cubic-bezier(.2,.8,.2,1); will-change: transform; }
  .cursor-glow {
    position: absolute; pointer-events: none; z-index: 1;
    width: 480px; height: 480px; border-radius: 50%;
    background: radial-gradient(circle, rgba(var(--gold-rgb),.22) 0%, rgba(var(--gold-rgb),.06) 35%, transparent 65%);
    filter: blur(20px);
    transform: translate(-50%, -50%);
    transition: opacity 400ms ease;
    mix-blend-mode: screen;
  }
  .draw-svg path { stroke-dasharray: 600; stroke-dashoffset: 600; animation: drawStroke 1.4s cubic-bezier(.5,0,.2,1) .1s forwards; }
  .glow-pulse { animation: glowPulse 4s ease-in-out infinite; }

  /* Inputs / selects look */
  select, input, textarea { color: var(--fg); }
  select option { background: var(--card); color: var(--fg); }
  input::placeholder, textarea::placeholder { color: var(--muted); opacity: 0.7; }

  /* Smooth color transitions on theme/palette swap */
  body, [class] { transition-property: background-color, color, border-color; transition-duration: 350ms; transition-timing-function: ease; }

  /* Hide scrollbar in mobile drawer */
  .text-balance { text-wrap: balance; }
</style>

// Reusable hooks and small components
const { useState, useEffect, useRef, useMemo } = React;

// Reveal-on-scroll wrapper
function Reveal({ children, delay = 0, className = "", as: Tag = "div" }) {
  const ref = useRef(null);
  const [shown, setShown] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    // If element is already in viewport on mount, reveal immediately
    const rect = el.getBoundingClientRect();
    if (rect.top < window.innerHeight && rect.bottom > 0) {
      setShown(true);
      return;
    }
    const io = new IntersectionObserver(
      (entries) => {
        entries.forEach((e) => {
          if (e.isIntersecting) {
            setShown(true);
            io.unobserve(e.target);
          }
        });
      },
      { threshold: 0.12, rootMargin: "0px 0px -40px 0px" }
    );
    io.observe(el);
    return () => io.disconnect();
  }, []);
  return (
    <Tag
      ref={ref}
      className={className}
      style={{
        opacity: shown ? 1 : 0,
        transform: shown ? "translate3d(0,0,0)" : "translate3d(0,28px,0)",
        transition: `opacity 900ms cubic-bezier(.2,.7,.2,1) ${delay}ms, transform 900ms cubic-bezier(.2,.7,.2,1) ${delay}ms`,
        willChange: "opacity,transform",
      }}
    >
      {children}
    </Tag>
  );
}

// Animated count-up
function CountUp({ end, suffix = "", duration = 1800 }) {
  const ref = useRef(null);
  const [val, setVal] = useState(0);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    let raf, started = false, t0;
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting && !started) {
          started = true;
          const step = (ts) => {
            if (!t0) t0 = ts;
            const p = Math.min(1, (ts - t0) / duration);
            const eased = 1 - Math.pow(1 - p, 3);
            setVal(Math.round(end * eased));
            if (p < 1) raf = requestAnimationFrame(step);
          };
          raf = requestAnimationFrame(step);
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.4 });
    io.observe(el);
    return () => { io.disconnect(); cancelAnimationFrame(raf); };
  }, [end, duration]);
  return <span ref={ref}>{val.toLocaleString()}{suffix}</span>;
}

function ParticleField() {
  const ref = uR(null);
  uE(() => {
    const c = ref.current; if (!c) return;
    const ctx = c.getContext("2d");
    let w, h, raf;
    const resize = () => { w = c.width = c.offsetWidth * devicePixelRatio; h = c.height = c.offsetHeight * devicePixelRatio; };
    resize(); window.addEventListener("resize", resize);
    const N = 60;
    const parts = Array.from({length: N}, () => ({
      x: Math.random()*w, y: Math.random()*h,
      vx: (Math.random()-0.5)*0.3*devicePixelRatio, vy: (Math.random()-0.5)*0.3*devicePixelRatio,
      r: (Math.random()*1.5+0.5)*devicePixelRatio,
    }));
    const tick = () => {
      ctx.clearRect(0,0,w,h);
      const goldRGB = getComputedStyle(document.documentElement).getPropertyValue("--gold-rgb").trim() || "212,175,55";
      for (const p of parts) {
        p.x += p.vx; p.y += p.vy;
        if (p.x<0||p.x>w) p.vx*=-1; if (p.y<0||p.y>h) p.vy*=-1;
        ctx.beginPath();
        ctx.fillStyle = `rgba(${goldRGB},0.5)`;
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
      }
      for (let i=0;i<N;i++) for (let j=i+1;j<N;j++) {
        const dx=parts[i].x-parts[j].x, dy=parts[i].y-parts[j].y; const d=Math.hypot(dx,dy);
        if (d<140*devicePixelRatio) {
          ctx.strokeStyle = `rgba(${goldRGB},${0.18*(1-d/(140*devicePixelRatio))})`;
          ctx.lineWidth = 1;
          ctx.beginPath(); ctx.moveTo(parts[i].x,parts[i].y); ctx.lineTo(parts[j].x,parts[j].y); ctx.stroke();
        }
      }
      raf = requestAnimationFrame(tick);
    };
    tick();
    return () => { cancelAnimationFrame(raf); window.removeEventListener("resize", resize); };
  }, []);
  return <canvas ref={ref} className="absolute inset-0 w-full h-full" />;
}

function Contact({ t, lang }) {
  const [form, setForm] = bS({ name: "", phone: "", course: "", message: "" });
  const [errors, setErrors] = bS({});
  const [status, setStatus] = bS("idle"); // idle | sending | done

  const validate = () => {
    const e = {};
    if (!form.name.trim()) e.name = t.contact.errName;
    if (!/^[+\d\s()-]{7,}$/.test(form.phone)) e.phone = t.contact.errPhone;
    if (!form.course) e.course = t.contact.errCourse;
    setErrors(e);
    return Object.keys(e).length === 0;
  };

  const submit = (ev) => {
    ev.preventDefault();
    if (!validate()) return;
    setStatus("sending");
    setTimeout(() => {
      setStatus("done");
      setForm({ name: "", phone: "", course: "", message: "" });
      setTimeout(() => setStatus("idle"), 4000);
    }, 1100);
  };

  const inp = (name, ph, type = "text") => (
    <div>
      <input
        type={type}
        value={form[name]}
        onChange={(e) => setForm((f) => ({ ...f, [name]: e.target.value }))}
        placeholder={ph}
        className="w-full bg-transparent border-0 border-b py-4 text-[15px] outline-none transition-colors focus:border-[var(--gold)]"
        style={{ borderColor: errors[name] ? "#c84a4a" : "var(--hairline)", color: "var(--fg)", fontFamily: "Inter, sans-serif" }}
      />
      {errors[name] && <div className="mt-1 text-[11px]" style={{ color: "#c84a4a" }}>{errors[name]}</div>}
    </div>
  );

  return (
    <section id="contact" className="py-24 lg:py-36" style={{ background: "var(--band)" }}>
      <div className="max-w-[1320px] mx-auto px-6 lg:px-10 grid lg:grid-cols-12 gap-12">

          <Reveal><Eyebrow>{t.contact.eyebrow}</Eyebrow></Reveal>

            <h2 className="mt-5 text-[clamp(40px,5vw,68px)] leading-[1.02] tracking-tight" style={{ fontFamily: "'Cormorant Garamond', serif", fontWeight: 500, color: "var(--fg)" }}>
              {t.contact.title}<span style={{ color: "var(--gold)" }}>.</span>
            </h2>
          </Reveal>
          <Reveal delay={220}>
            <p className="mt-5 text-[16px] leading-[1.7]" style={{ color: "var(--muted)", fontFamily: "Inter, sans-serif" }}>{t.contact.sub}</p>
          </Reveal>

          <Reveal delay={320}>
            <div className="mt-10 space-y-5" style={{ fontFamily: "Inter, sans-serif" }}>
              <ContactRow icon={<Icon.Pin />} label={t.contact.address} />
              <ContactRow icon={<Icon.Phone />} label={t.contact.phoneNum} />
              <ContactRow icon={<Icon.Clock />} label={t.contact.hours} />
            </div>
          </Reveal>

          {/* Map placeholder */}
          <Reveal delay={400}>
            <div className="mt-8 rounded-2xl overflow-hidden relative aspect-[16/9]" style={{ border: "1px solid var(--hairline)", background: "linear-gradient(135deg, var(--mesh1), var(--mesh2))" }}>
              <div className="absolute inset-0" style={{
                backgroundImage: "linear-gradient(var(--hairline) 1px, transparent 1px), linear-gradient(90deg, var(--hairline) 1px, transparent 1px)",
                backgroundSize: "32px 32px", opacity: 0.6,
              }}/>
              <div className="absolute inset-0 grid place-items-center">

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // Hide the toggle until the host has actually enabled the rail (the
  // __omelette_rail_enabled window message, posted only when the
  // omelette_deck_rail_enabled flag is on for this user). The initial read
  // covers TweaksPanel mounting after the message already arrived; the
  // listener covers the common case of mounting first.
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

// ===== Routing =====
function useRoute() {
  const [route, setRoute] = React.useState(() => window.location.hash || "#/");
  React.useEffect(() => {
    const onHash = () => setRoute(window.location.hash || "#/");
    window.addEventListener("hashchange", onHash);
    return () => window.removeEventListener("hashchange", onHash);
  }, []);
  React.useEffect(() => {
    // Full-page navigations (main vs teacher detail) snap to top.
    if (route === "#/" || route.startsWith("#/teacher/")) {
      window.scrollTo({ top: 0, behavior: "instant" });
      return;
    }
    // Section anchors (#contact, #courses, #teachers, etc.) — scroll the
    // matching element into view. Wait one frame so the route-render lands first.
    const id = route.replace(/^#\/?/, "").replace(/^#/, "");
    if (!id) return;
    requestAnimationFrame(() => {
      const el = document.getElementById(id);
      if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
    });
  }, [route]);
  return route;
}

// ===== WOW components =====

function Preloader() {
  const [gone, setGone] = React.useState(false);
  React.useEffect(() => {
    const t = setTimeout(() => setGone(true), 2000);
    return () => clearTimeout(t);
  }, []);
  if (gone) return null;
  return (
    <div className="preloader">
      <div className="preloader-ring" />
      <div className="preloader-ring" style={{ animationDelay: ".4s" }} />
      <div className="relative grid place-items-center" style={{ width: 120, height: 120 }}>
        <svg viewBox="0 0 100 100" width="80" height="80" className="draw-svg">
          <path d="M 20 20 L 80 20 L 80 35 L 35 35 L 35 47 L 70 47 L 70 60 L 35 60 L 35 75 L 80 75 L 80 88"
                fill="none" stroke="var(--gold)" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" />
        </svg>
        <div className="absolute -bottom-7 text-[10px] uppercase tracking-[0.4em]" style={{ color: "var(--gold)", fontFamily: "Inter, sans-serif" }}>ELEGANT</div>
      </div>
      <div className="preloader-bar" />
    </div>
  );
}

function ScrollProgress() {
  const [w, setW] = React.useState(0);
  React.useEffect(() => {
    const onScroll = () => {
      const h = document.documentElement;
      const max = h.scrollHeight - h.clientHeight;
      setW(max > 0 ? (h.scrollTop / max) * 100 : 0);
    };
    onScroll();
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, []);
  return <div className="scroll-progress" style={{ width: w + "%" }} />;
}

function CursorGlow({ targetRef }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const target = targetRef.current;
    const el = ref.current;
    if (!target || !el) return;
    let raf, x = 0, y = 0, tx = 0, ty = 0;
    const onMove = (e) => {
      const r = target.getBoundingClientRect();
      tx = e.clientX - r.left;
      ty = e.clientY - r.top;
      el.style.opacity = "1";
    };
    const onLeave = () => { el.style.opacity = "0"; };
    const tick = () => {
      x += (tx - x) * 0.15;
      y += (ty - y) * 0.15;
      el.style.left = x + "px";
      el.style.top = y + "px";
      raf = requestAnimationFrame(tick);
    };
    target.addEventListener("mousemove", onMove);
    target.addEventListener("mouseleave", onLeave);
    raf = requestAnimationFrame(tick);
    return () => {
      target.removeEventListener("mousemove", onMove);
      target.removeEventListener("mouseleave", onLeave);
      cancelAnimationFrame(raf);
    };
  }, []);
  return <div ref={ref} className="cursor-glow" style={{ opacity: 0, left: "-9999px", top: "-9999px" }} />;
}

function Marquee({ items }) {
  const doubled = [...items, ...items];
  return (
    <div className="relative overflow-hidden py-6" style={{ borderTop: "1px solid var(--hairline)", borderBottom: "1px solid var(--hairline)", background: "var(--band)" }}>
      <div className="marquee-track">
        {doubled.map((it, i) => (
          <div key={i} className="flex items-center gap-6 px-8 shrink-0">
            <span className="text-[clamp(20px,2.4vw,34px)] italic" style={{ fontFamily: "'Cormorant Garamond', serif", color: "var(--fg)", opacity: 0.85 }}>{it}</span>
            <span className="w-1.5 h-1.5 rounded-full" style={{ background: "var(--gold)" }} />
          </div>
        ))}
      </div>
      <div className="absolute inset-y-0 left-0 w-24 pointer-events-none" style={{ background: "linear-gradient(90deg, var(--band), transparent)" }} />
      <div className="absolute inset-y-0 right-0 w-24 pointer-events-none" style={{ background: "linear-gradient(-90deg, var(--band), transparent)" }} />
    </div>
  );
}

function Magnetic({ children, strength = 0.35 }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const onMove = (e) => {
      const r = el.getBoundingClientRect();
      const x = e.clientX - (r.left + r.width / 2);
      const y = e.clientY - (r.top + r.height / 2);
      el.style.transform = `translate3d(${x * strength}px, ${y * strength}px, 0)`;
    };
    const onLeave = () => { el.style.transform = "translate3d(0,0,0)"; };
    el.addEventListener("mousemove", onMove);
    el.addEventListener("mouseleave", onLeave);
    return () => {
      el.removeEventListener("mousemove", onMove);
      el.removeEventListener("mouseleave", onLeave);
    };
  }, [strength]);
  return <span ref={ref} className="magnet-btn inline-block">{children}</span>;
}

function Tilt3D({ children, max = 10, className = "", style = {} }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const onMove = (e) => {
      const r = el.getBoundingClientRect();
      const px = (e.clientX - r.left) / r.width;
      const py = (e.clientY - r.top) / r.height;
      const rx = (0.5 - py) * max;
      const ry = (px - 0.5) * max;
      el.style.transform = `perspective(900px) rotateX(${rx}deg) rotateY(${ry}deg) translateZ(0)`;
      el.style.setProperty("--mx", (px * 100) + "%");
      el.style.setProperty("--my", (py * 100) + "%");
    };
    const onLeave = () => { el.style.transform = "perspective(900px) rotateX(0) rotateY(0)"; };
    el.addEventListener("mousemove", onMove);
    el.addEventListener("mouseleave", onLeave);
    return () => {
      el.removeEventListener("mousemove", onMove);
      el.removeEventListener("mouseleave", onLeave);
    };
  }, [max]);
  return (
    <div ref={ref} className={"tilt-card " + className} style={style}>
      {children}
      <div className="tilt-shine" />
    </div>
  );
}

function WordReveal({ text, className = "", style = {}, delay = 0, perWord = 80 }) {
  const words = String(text).split(" ");
  return (
    <span className={className} style={style}>
      {words.map((w, i) => (
        <React.Fragment key={i}>
          <span className="word-mask">
            <span style={{ animationDelay: (delay + i * perWord) + "ms" }}>{w}</span>
          </span>
          {i < words.length - 1 ? " " : ""}
        </React.Fragment>
      ))}
    </span>
  );
}
